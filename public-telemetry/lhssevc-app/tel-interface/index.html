<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/png" href="/favicon.png" />
		<link rel="stylesheet" href="/src/style.css" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>lhss telemetry interface 🔋🏎️📡😼💥</title>
	</head>
	<body data-sidebar-layout>
		<nav data-topnav>
			<p>lhss telemetry interface 🔋🏎️📡😼💥</p>
		</nav>

		<aside data-sidebar>
			<p>refreshed <code id="timestamp"></code></p>
			<!-- <p id="timestamp"></p> -->
			<p>busv <code id="busv"></code> volts</p>
			<p>current <code id="current"></code> amps</p>
			<p>power <code id="power"></code> watts</p>
			<p>hall_speed <code id="hall-speed"></code> km/h</p>
			<p>soc <code id="soc"></code>%</p>
			<p class="small">records received <code id="records"></code></p>
			<p class="small">requests made <code id="requests"></code></p>
		</aside>

		<main>
			<div class="canvas-container">
				<canvas id="busv-chart"></canvas>
			</div>
			<div class="canvas-container">
				<canvas id="soc-chart"></canvas>
			</div>
			<div class="canvas-container">
				<canvas id="current-chart"></canvas>
			</div>
			<div class="canvas-container">
				<canvas id="power-chart"></canvas>
			</div>
			<div class="canvas-container">
				<canvas id="hallspeed-chart"></canvas>
			</div>
		</main>

		<script type="module" src="/src/main.js"></script>
	</body>
</html>
